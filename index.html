<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gotify 客户端</title>
    <script>
      const mode = localStorage.getItem("gotify-theme-mode") === "black" ? "black" : "white";
      document.documentElement.dataset.theme = mode;
      const isToast = window.location.search.includes('toast') || window.location.hash.includes('toast') || window.name.includes('toast') || (typeof window.__TAURI__ !== 'undefined' && window.__TAURI__.window.getCurrent().label.includes('toast'));
      document.documentElement.style.colorScheme = mode === "black" ? "dark" : "light";
      if (isToast) {
        document.documentElement.style.background = "transparent";
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
